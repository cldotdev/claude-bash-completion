schema: spec-driven
context: |
  - Design: DRY, KISS, YAGNI, SOLID, SoC, Law of Demeter, Fail Fast
  - No backward compatibility unless explicitly specified
  - Check existing helpers/utilities before implementing new logic
  - Read README.md first: extract exact test/dev commands (e.g. docker compose wrappers) and use them throughout

  Development standards:

  Iron laws:

  - No production code without a failing test. Write test first, watch it fail, then implement.
  - No fixes without root cause investigation. Find WHY before fixing WHAT.
  - No completion claims without fresh verification. Run the command, read the output, then claim.

  Verification gate (before claiming completion):

  1. IDENTIFY - What command proves this claim?
  2. RUN - Execute the full command (fresh run)
  3. READ - Full output, check exit code
  4. VERIFY - Does output confirm claim?
  5. THEN - Make the claim with evidence

  Systematic debugging (complete each phase before proceeding):

  1. Root cause investigation: read error messages completely, reproduce consistently, check recent changes, trace data flow backward
  2. Pattern analysis: find working examples in codebase, compare working vs broken, list every difference
  3. Hypothesis and testing: form single hypothesis, test with smallest possible change, one variable at a time
  4. Implementation: create failing test case first, single fix addressing root cause, verify fix with no regressions

  When stuck (after 3 attempts): stop, document what failed, research 2-3 alternatives, question fundamentals, try a completely different angle

  Definition of done:

  - Tests written and passing
  - Code follows project conventions
  - No linter/formatter warnings
  - Implementation matches plan
  - No TODOs without issue numbers

  Stack: Bash
  Linter/Formatter: shellcheck
  Testing: bats
  Security scanning: gitleaks

  Bash idioms:

  - set -euo pipefail in all scripts
  - ShellCheck compliance (shellcheck -x)
  - Quote all variable expansions ("$var", "${var}")
  - Use [[ ]] over [ ], $() over backticks
  - snake_case for functions and variables, UPPER_CASE for exported/constants
  - local for function variables, readonly for constants
  - Arrays over space-separated strings
  - Parameter expansion for defaults (${var:-default}, ${var:?error})
  - printf over echo for portable output
  - command -v over which for command existence checks
  - Explicit return/exit codes with meaningful values
  - Error messages to stderr (>&2)
  - trap for cleanup (trap cleanup EXIT)
  - getopts or manual parsing for arguments, always provide --help
rules:
  proposal:
    - Identify affected functions, components, schemas and dependencies
    - Identify backward compatibility
    - Identify environment variable and configuration changes
    - Consider data migration needs (if applicable)
    - Consider rollback plan for database changes (if applicable)
    - Evaluate accessibility requirements (keyboard navigation, screen reader, WCAG 2.1 AA) (if applicable)
  specs:
    - Use Given/When/Then format
    - Consider edge cases (race condition, empty states, missing files)
  design:
    - Reference existing patterns before creating new ones
    - Consider portability requirements
    - Include performance considerations (N+1 query)
    - Include security considerations (SQL injection, input sanitization, auth/authz, XSS, CSP headers)
    - Document API contract changes (endpoints, methods, status codes) (if applicable)
  tasks:
    - Read README.md to identify commands and tools for development and testing
    - Include i18n and documentation updates (if applicable)
    - Include test, lint and security scanning (if applicable)
    - Run changed file tests first, then full suite
_templates:
  - bash
